<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIST GradeMetric</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --bg-dark: #0a0a0a;
            --rolling-speed: 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            color: white;
            padding: 20px;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 25px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h1 { 
            color: var(--gold); 
            text-align: center; 
            font-size: 24px; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-bottom: 25px; 
            letter-spacing: 1px;
            font-family: 'Open Sans', sans-serif;
        }

        /* THE TRACK */
        .selector-track {
            position: relative;
            display: flex;
            background: #111;
            border-radius: 50px;
            padding: 5px;
            margin-bottom: 20px;
            border: 1px solid #333;
            height: 48px;
            align-items: center;
            isolation: isolate; 
        }

        .selector-track button {
            flex: 1;
            height: 100%;
            border: none;
            background: none;
            color: #777;
            font-weight: 700;
            cursor: pointer;
            z-index: 3;
            font-family: 'Open Sans', sans-serif;
            transition: color 0.5s ease;
            font-size: 13px;
        }

        .selector-track button.active { color: #000; }

        /* THE ROLLING CIRCLE/PILL */
        .rolling-glider {
            position: absolute;
            height: calc(100% - 10px);
            width: calc(50% - 5px);
            background: var(--gold);
            border-radius: 40px; 
            z-index: 1;
            left: 5px;
            transition: transform var(--rolling-speed);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        /* INCREASED FONT SIZE FOR INPUT TITLES/LABELS */
        .input-group label { 
            display: block; 
            font-size: 14px; /* Increased from 11px */
            color: var(--gold); 
            font-weight: 700; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
        }
        
        input, select {
            width: 100%; border: 1px solid #333; background: var(--bg-dark); padding: 12px;
            border-radius: 12px; color: #fff; margin-bottom: 15px; box-sizing: border-box; 
            font-size: 14px; font-family: 'Open Sans', sans-serif;
        }

        .ct-grid, .grid-inputs { display: grid; gap: 10px; }
        .ct-grid { grid-template-columns: 1fr 1fr 1fr; }
        .grid-inputs { grid-template-columns: 1fr 1fr; }

        .course-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

        .calc-btn {
            width: 100%; background: var(--gold); color: #000; border: none; padding: 15px;
            border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; 
            margin-top: 10px; font-family: 'Open Sans', sans-serif;
        }

        .reset-btn {
            width: 100%; background: transparent; color: #888; border: 1px solid #333;
            padding: 8px; margin-top: 10px; border-radius: 12px; cursor: pointer; font-size: 11px;
            font-family: 'Open Sans', sans-serif;
        }

        .result-box {
            margin-top: 20px; padding: 15px; background: rgba(212, 175, 55, 0.1);
            border: 2px solid var(--gold); border-radius: 15px; text-align: center;
        }

        #displayResult { color: var(--gold); font-weight: 700; font-size: 15px; }

        .footer-credit { 
            margin-top: 25px; 
            text-align: center; 
            font-size: 11px; 
            color: var(--gold); 
            font-weight: 700;
            text-transform: uppercase; 
            letter-spacing: 1px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="app-card">
    <h1>MIST GRADE METRIC</h1>

    <div class="selector-track">
        <div id="tabGlider" class="rolling-glider"></div>
        <button id="tab-mark" class="active" onclick="switchTab('mark')">Estimator</button>
        <button id="tab-cgpa" onclick="switchTab('cgpa')">CGPA Calc</button>
    </div>

    <div id="mark-section">
        <div class="selector-track">
            <div id="creditGlider" class="rolling-glider" style="transform: translateX(100%);"></div>
            <button id="btn2" onclick="setCredit(2)">2.0 Credits</button>
            <button id="btn3" class="active" onclick="setCredit(3)">3.0 Credits</button>
        </div>

        <div class="input-group">
            <label>CT MARKS (Max 20)</label>
            <div class="ct-grid">
                <input type="number" id="ct1" placeholder="CT 1">
                <input type="number" id="ct2" placeholder="CT 2">
                <input type="number" id="ct3" placeholder="CT 3">
            </div>
        </div>
        <div class="grid-inputs">
            <div class="input-group"><label id="midLabel">MID TERM (Max 30)</label><input type="number" id="midterm"></div>
            <div class="input-group"><label id="attLabel">ATTENDANCE (Max 15)</label><input type="number" id="attendance"></div>
            <div class="input-group"><label id="perfLabel">CLASS PERF. (Max 15)</label><input type="number" id="performance"></div>
            <div class="input-group">
                <label>TARGET GPA</label>
                <select id="targetGPA">
                    <option value="80.0">4.00 (A+)</option>
                    <option value="75.0">3.75 (A)</option>
                    <option value="70.0">3.50 (A-)</option>
                    <option value="65.0">3.25 (B+)</option>
                    <option value="60.0">3.00 (B)</option>
                    <option value="55.0">2.75 (B-)</option>
                    <option value="50.0">2.50 (C+)</option>
                    <option value="45.0">2.25 (C)</option>
                    <option value="40.0">2.00 (D)</option>
                </select>
            </div>
        </div>
        <button class="calc-btn" onclick="calculateMark()">Calculate Requirement</button>
    </div>

    <div id="cgpa-section" style="display: none;">
        <div class="input-group">
            <label>ENTER SUBJECT DETAILS</label>
            <div id="course-rows">
                <div class="course-row">
                    <input type="number" step="0.01" class="c-credit" placeholder="Credit">
                    <input type="number" step="0.01" class="c-gp" placeholder="GP (0.0-4.0)">
                </div>
            </div>
            <button style="width:100%; background:transparent; color:var(--gold); border:1px dashed var(--gold); padding:8px; border-radius:10px; cursor:pointer; margin-bottom:15px; font-size:11px; font-family: 'Open Sans';" onclick="addRow()">+ Add Subject</button>
        </div>
        <button class="calc-btn" onclick="calculateCGPA()">Calculate CGPA</button>
    </div>

    <button class="reset-btn" onclick="resetForm()">Reset All</button>

    <div id="resultBox" class="result-box" style="display:none;">
        <div id="displayResult"></div>
    </div>

    <div class="footer-credit">Made by Abir Anwar Khan (AE-17)</div>
</div>

<script>
    let selectedCredit = 3;

    function switchTab(tab) {
        const glider = document.getElementById('tabGlider');
        const isMark = (tab === 'mark');
        document.getElementById('mark-section').style.display = isMark ? 'block' : 'none';
        document.getElementById('cgpa-section').style.display = isMark ? 'none' : 'block';
        glider.style.transform = isMark ? 'translateX(0)' : 'translateX(100%)';
        document.getElementById('tab-mark').classList.toggle('active', isMark);
        document.getElementById('tab-cgpa').classList.toggle('active', !isMark);
        document.getElementById('resultBox').style.display = "none";
    }

    function setCredit(val) {
        selectedCredit = val;
        const glider = document.getElementById('creditGlider');
        const isTwo = (val === 2);
        glider.style.transform = isTwo ? 'translateX(0)' : 'translateX(100%)';
        document.getElementById('btn2').classList.toggle('active', isTwo);
        document.getElementById('btn3').classList.toggle('active', !isTwo);
        const maxMid = isTwo ? 20 : 30;
        const maxOther = isTwo ? 10 : 15;
        document.getElementById('midLabel').innerText = `MID TERM (Max ${maxMid})`;
        document.getElementById('attLabel').innerText = `ATTENDANCE (Max ${maxOther})`;
        document.getElementById('perfLabel').innerText = `CLASS PERF. (Max ${maxOther})`;
    }

    function calculateMark() {
        const cts = [parseFloat(document.getElementById('ct1').value), parseFloat(document.getElementById('ct2').value), parseFloat(document.getElementById('ct3').value)];
        for(let v of cts) if (v > 20) return showResult("❌ Error: CT marks > 20!", true);
        let ctArray = cts.filter(n => !isNaN(n)).sort((a,b) => b-a);
        if (ctArray.length < 2) return alert("Enter 2 CT marks.");
        
        const mid = parseFloat(document.getElementById('midterm').value) || 0;
        const att = parseFloat(document.getElementById('attendance').value) || 0;
        const perf = parseFloat(document.getElementById('performance').value) || 0;
        const target = parseFloat(document.getElementById('targetGPA').value);

        const maxM = selectedCredit === 2 ? 20 : 30;
        const maxO = selectedCredit === 2 ? 10 : 15;
        if (mid > maxM || att > maxO || perf > maxO) return showResult(`❌ Error: Input exceeds limits!`, true);

        let cur = ((ctArray[0]+ctArray[1])/2) + (mid/maxM*10) + (att/maxO*5) + (perf/maxO*5);
        let maxF = selectedCredit === 2 ? 120 : 180;
        let final = ((target - cur) / 60) * maxF;

        if (final > maxF) showResult("Target Unreachable!", true);
        else showResult(`NEED: ${Math.max(0, final).toFixed(2)} / ${maxF}`);
    }

    function calculateCGPA() {
        const credits = document.getElementsByClassName('c-credit');
        const gps = document.getElementsByClassName('c-gp');
        let totalP = 0, totalC = 0;
        for (let i = 0; i < credits.length; i++) {
            let c = parseFloat(credits[i].value), g = parseFloat(gps[i].value);
            if (!isNaN(c) && !isNaN(g)) {
                if (![0.75, 1.5, 2.0, 3.0].includes(c)) return showResult(`❌ Error: Invalid Credit.`, true);
                if (g < 0 || g > 4.0) return showResult(`❌ Error: GP 0-4.`, true);
                totalP += (c * g); totalC += c;
            }
        }
        if (totalC === 0) return alert("Enter values!");
        showResult(`ESTIMATED GPA: ${(totalP / totalC).toFixed(2)}`);
    }

    function addRow() {
        const div = document.createElement('div');
        div.className = 'course-row';
        div.innerHTML = `<input type="number" step="0.01" class="c-credit" placeholder="Credit"><input type="number" step="0.01" class="c-gp" placeholder="GP">`;
        document.getElementById('course-rows').appendChild(div);
    }

    function showResult(msg, err=false) {
        document.getElementById('resultBox').style.display = "block";
        const d = document.getElementById('displayResult');
        d.innerHTML = msg; d.style.color = err ? "#ff4d4d" : "var(--gold)";
    }

    function resetForm() {
        document.querySelectorAll('input').forEach(i => i.value = '');
        document.getElementById('course-rows').innerHTML = `<div class="course-row"><input type="number" step="0.01" class="c-credit" placeholder="Credit"><input type="number" step="0.01" class="c-gp" placeholder="GP"></div>`;
        document.getElementById('resultBox').style.display = "none";
        setCredit(3); switchTab('mark');
    }
</script>
</body>
</html>
