<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIST Academic Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-card">
    <div class="header">
        <h1>MIST GRADE METRIC</h1>
    </div>

    <div class="tab-container">
        <button id="tab-mark" class="tab-btn active" onclick="switchTab('mark')">Mark Estimator</button>
        <button id="tab-cgpa" class="tab-btn" onclick="switchTab('cgpa')">CGPA Calc</button>
    </div>

    <div id="mark-section">
        <div class="credit-toggle">
            <button id="btn2" onclick="setCredit(2)">2.0 Credits</button>
            <button id="btn3" class="active" onclick="setCredit(3)">3.0 Credits</button>
        </div>

        <div class="input-group">
            <label>CT MARKS (Max 20) (Best 2 will be taken)</label>
            <div class="ct-grid">
                <input type="number" id="ct1" placeholder="CT 1">
                <input type="number" id="ct2" placeholder="CT 2">
                <input type="number" id="ct3" placeholder="CT 3">
            </div>
        </div>

        <div class="grid-inputs">
            <div class="input-group">
                <label id="midLabel">MID TERM (Max 30)</label>
                <input type="number" id="midterm" placeholder="Score">
            </div>
            <div class="input-group">
                <label id="attLabel">ATTENDANCE (Max 15)</label>
                <input type="number" id="attendance" placeholder="Score">
            </div>
            <div class="input-group">
                <label id="perfLabel">CLASS PERF. (Max 15)</label>
                <input type="number" id="performance" placeholder="Score">
            </div>
            <div class="input-group">
                <label>TARGET GPA</label>
                <select id="targetGPA" class="gpa-select">
                    <option value="80">4.00 (A+)</option>
                    <option value="75">3.75 (A)</option>
                    <option value="70">3.50 (A-)</option>
                    <option value="65">3.25 (B+)</option>
                    <option value="60">3.00 (B)</option>
                    <option value="55">2.75 (B-)</option>
                    <option value="50">2.50 (C+)</option>
                    <option value="45">2.25 (C)</option>
                    <option value="40">2.00 (D)</option>
                </select>
            </div>
        </div>
        <button class="calc-btn" onclick="calculate()">Calculate Requirement</button>
    </div>

    <div id="cgpa-section" style="display: none;">
        <div class="input-group">
            <label>ENTER SEMESTER GRADES</label>
            <div id="course-rows">
                <div class="course-row">
                    <input type="number" step="0.01" class="c-credit" placeholder="Credit (e.g. 3.0)">
                    <input type="number" step="0.01" class="c-gp" placeholder="GP (e.g. 3.75)">
                </div>
            </div>
            <button class="add-row-btn" onclick="addRow()">+ Add Course</button>
        </div>
        <button class="calc-btn" onclick="calculateCGPA()">Calculate CGPA</button>
    </div>

    <button class="reset-btn" onclick="resetForm()">Reset All</button>

    <div class="progress-container" id="progBar" style="display:none;">
        <div class="progress-fill" id="fill"></div>
    </div>

    <div id="resultBox" class="result-box" style="display:none;">
        <div id="displayResult"></div>
    </div>

    <div class="footer-credit">
        Made by Abir Anwar Khan (AE-17)
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
